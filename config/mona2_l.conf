# Encoder config -------------------

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y


# Battery config -------------------

CONFIG_ZMK_BATTERY_REPORTING=y


# DYA Studio (Peripheral side) --------
# _STUDIO_RPC 系は Central 専用のため Peripheral では省略

CONFIG_ZMK_BATTERY_HISTORY=y
CONFIG_ZMK_SETTINGS_RPC=y

# Split イベントリレー — cormoran/zmk フォークで提供
CONFIG_ZMK_SPLIT_RELAY_EVENT=y

# 設定の永続化（10秒デバウンス: Flash 摩耗と電源喪失時のデータロスのトレードオフ）
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000


# BLE stability -------------------
# 2M PHY 無効化による接続安定化（split 切断対策）
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# TX 出力を最大に（0 dBm → +8 dBm）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# 接続維持の強化（BLE 突然切断対策）
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600   # supervision timeout 4s→6s
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0     # 全コネクションイベントに応答
