manifest:
  defaults:
    revision: main
  remotes:
    - name: cormoran
      url-base: https://github.com/cormoran
    - name: sayu-hub
      url-base: https://github.com/sayu-hub
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: zettaface
      url-base: https://github.com/zettaface
  projects:
    # ── Core ──────────────────────────────────────────────────────
    # ZMK: DYA Studio 用カスタム RPC サブシステム付き cormoran fork
    - name: zmk
      remote: cormoran
      revision: v0.3-branch+dya
      import: app/west.yml

    # ── Behavior ──────────────────────────────────────────────────
    # runtime sensor rotate モジュール本体
    - name: zmk-behavior-runtime-sensor-rotate
      remote: cormoran

    # ── Driver ────────────────────────────────────────────────────
    # トラックボール用ドライバー
    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: zmk-0.3

    # ── DYA Studio モジュール（オプション: Studio UI 連携用）──────
    - name: zmk-module-ble-management
      remote: cormoran
    - name: zmk-module-battery-history
      remote: cormoran
    - name: zmk-module-settings-rpc
      remote: cormoran
    - name: zmk-module-runtime-input-processor
      remote: cormoran
  self:
    path: config
